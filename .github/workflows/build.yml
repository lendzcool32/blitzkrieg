name: Build Geode Mod

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          sdk: nightly

            - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blitzkrieg-consistency-${{ matrix.config.name }}
          path: output/
